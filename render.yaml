services:
  - type: web
    name: transitops
    env: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: transitops-db
          property: connectionString

databases:
  - name: transitops-db
    region: singapore
    plan: free
    databaseName: transitops
    user: transitops_user
